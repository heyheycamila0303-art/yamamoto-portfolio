<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yamamoto Shoji — 登山ガイド</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --white: #ffffff;
    --off-white: #f8f6f2;
    --stone: #e8e4dc;
    --stone-mid: #c4bfb5;
    --text-dark: #1a1814;
    --text-mid: #4a4640;
    --text-light: #8a8480;
    --accent-green: #3d5a3e;
    --accent-warm: #8b6914;
    --nav-h: 64px;
  }
  html { scroll-behavior: smooth; }
  body { font-family: "Zen Kaku Gothic New", sans-serif; color: var(--text-dark); background: var(--white); font-weight: 300; line-height: 1.7; }

  /* NAV */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; height: var(--nav-h); display: flex; align-items: center; justify-content: space-between; padding: 0 2.5rem; background: rgba(255,255,255,0.92); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.07); }
  .nav-logo { font-family: "Cormorant Garamond", serif; font-size: 1.4rem; font-weight: 600; letter-spacing: 0.12em; color: var(--text-dark); text-decoration: none; }
